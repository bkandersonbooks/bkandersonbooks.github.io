<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>The Anderson Family Series — Legacy Books</title>

<meta name="description" content="The Anderson Family Series by B.K. Anderson — Legacy books rooted in Tennessee, Virginia, and beyond." />

<style>

:root{
--bg:#0b0c10;
--fg:#e8f0fe;
--muted:#b2bfdc;
--accent:#86c5ff;
--card:#141622;
--cardBorder:#23263a;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
background:var(--bg);
color:var(--fg);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

header{
text-align:center;
padding:24px 16px;
}

h1{margin:0;font-size:2rem}
h2{margin:6px 0 0 0;font-size:1rem;color:var(--muted)}

.wrap{
max-width:1200px;
margin:0 auto;
padding:16px;
}

.grid{
display:grid;
gap:20px;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}

.card{
background:var(--card);
border:1px solid var(--cardBorder);
border-radius:14px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:auto;
display:block;
}

.card-body{
padding:14px 16px 16px 16px;
display:flex;
flex-direction:column;
gap:8px;
flex:1;
}

.card-title{
font-size:1.05rem;
font-weight:600;
}

.card-sub{
font-size:0.9rem;
color:var(--muted);
}

.card-desc{
font-size:0.9rem;
line-height:1.5;
}

.card-actions{
margin-top:auto;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.btn{
display:inline-block;
padding:8px 12px;
border-radius:10px;
border:1px solid var(--accent);
background:#2b6cb0;
color:#ffffff;
font-size:0.9rem;
text-decoration:none;
}

.btn:hover{
background:#1e4e8c;
}

.btn-secondary{
background:transparent;
color:#86c5ff;
border:1px solid #86c5ff;
}

.btn-secondary:hover{
background:#1e2235;
}

.backlink{
display:inline-block;
margin:12px 16px;
}

footer{
margin:24px 0 16px 0;
text-align:center;
font-size:0.85rem;
color:var(--muted);
}

</style>
</head>
