<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Anders Taft Series — Books by B.K. Anderson & Anders Taft</title>

<meta name="description" content="The Anders Taft Series explores consciousness, awakening, and Light through reflections written by B.K. Anderson & Anders Taft — including Awakening in Silence and The Echoes of Light."/>

<style>

:root{
--bg:#0b0c10;
--fg:#e8f0fe;
--muted:#b2bfdc;
--accent:#86c5ff;
--card:#141622;
--cardBorder:#23263a;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
background:var(--bg);
color:var(--fg);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{
max-width:1000px;
margin:0 auto;
padding:24px 16px;
}

h1{margin:6px 0}
.sub{color:var(--muted)}

/* grid layout */

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:16px;
margin-top:18px;
}

@media(max-width:650px){
.grid{grid-template-columns:1fr}
}

.card{
background:var(--card);
border:1px solid var(--cardBorder);
border-radius:16px;
overflow:hidden;
display:grid;
grid-template-rows:auto 1fr;
}

.thumb{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
background:#000;
}

.body{padding:12px 14px}

.title{
font-weight:700;
}

.series{
color:var(--muted);
font-size:.92rem;
margin-top:2px;
}

.actions{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 12px;
border:1px solid var(--accent);
border-radius:999px;
color:var(--accent);
font-size:.9rem;
}

.btn:hover{
background:rgba(134,197,255,.12);
text-decoration:none;
}

footer{
margin-top:40px;
text-align:center;
color:var(--muted);
font-size:.85rem;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Anders Taft Series</h1>
<div class="sub">Voice of Consciousness — Reflections of Light and Awareness</div>

<section class="grid">

<!-- Awakening in Silence -->

<article class="card">

<img class="thumb"
src="AwakeninginSilence.jpg"
alt="Awakening in Silence cover"
loading="lazy">

<div class="body">

<div class="title">Awakening in Silence</div>

<div class="series">B.K. Anderson & Anders Taft</div>

<div class="actions">

<a class="btn" href="awakening-in-silence.html">Details</a>

<a class="btn"
href="Awakening_in_Silence_Sample.pdf"
target="_blank"
rel="noopener">
Read Sample
</a>

</div>
</div>
</article>

<!-- The Echoes of Light -->

<article class="card">

<img class="thumb"
src="EchosOfLight.jpg"
alt="The Echoes of Light cover"
loading="lazy">

<div class="body">

<div class="title">The Echoes of Light</div>

<div class="series">Awakening in Silence Series</div>

<div class="actions">

<a class="btn" href="echoes-of-light.html">Details</a>

<a class="btn"
href="Echoes_of_Light_Sample.pdf"
target="_blank"
rel="noopener">
View Sample
</a>

</div>
</div>
</article>

</section>

<p style="margin-top:18px">
<a class="btn" href="index.html">← Back to Main Page</a>
</p>

<footer>
© <span id="yr"></span> B.K. Anderson — All Rights Reserved
</footer>

</div>

<script>
document.getElementById("yr").textContent=new Date().getFullYear();
</script>

</body>
</html>
