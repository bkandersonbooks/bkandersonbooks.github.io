<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.K. Anderson Books</title>

  <style>
    body {
      background: #0b0c10;
      color: #e8f0fe;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .panel {
      background: #141622;
      border: 1px solid #23263a;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .top {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .icon {
      font-size: 24px;
      margin-right: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .hint {
      font-size: 13px;
      color: #b2bfdc;
    }

    .row {
      display: flex;
      gap: 15px;
      align-items: flex-start;
    }

    .cover {
      width: 90px;
      border-radius: 6px;
    }

    .series {
      font-size: 14px;
      color: #b2bfdc;
      margin-bottom: 8px;
    }

    .actions {
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      padding: 6px 10px;
      background: #86c5ff;
      color: #000;
      text-decoration: none;
      border-radius: 5px;
      margin-right: 6px;
      margin-top: 6px;
      font-size: 13px;
    }

    .btn:hover {
      background: #a7d6ff;
    }
  </style>
</head>

<body>

  <!-- Bog Series -->
  <article class="panel">
    <div class="top">
      <div class="icon">🌿</div>
      <div>
        <div class="title">The Bog Series</div>
        <div class="hint">The awakening of living worlds</div>
      </div>
    </div>

    <div class="body">
      <div class="row">
        <img class="cover" src="SheStirsOne.jpg" alt="She Stirs">

        <div>
          <div class="title">She Stirs • She Seeks • She Sows</div>
          <div class="series">The beginning trilogy</div>

          <div class="actions">
            <a class="btn" href="the-bog-series.html">View Series</a>
            <a class="btn" href="#">Buy Direct</a>
          </div>
        </div>
      </div>
    </div>
  </article>

</body>
</html>
